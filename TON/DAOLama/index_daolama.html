      .dl-app-loader-overlay {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(14, 13, 13);
      }
      .dl-app-loader-overlay svg {
        display: block;
        min-width: 1em;
        max-width: 1em;
        min-height: 1em;
        max-height: 1em;
        margin: 0.25rem -0.5em;
        border-radius: 100%;
        overflow: hidden;
        transform: scaleY(-1);
        -webkit-animation: dlLoaderRotate 3s linear infinite;
        animation: dlLoaderRotate 3s linear infinite;
        font-size: 2.5rem;
        stroke-width: 17;
        color: #fff;
        stroke: #0e75b9;
      }
      .dl-app-loader-overlay svg circle {
        fill: none;
        stroke: inherit;
        stroke-width: inherit;
        -webkit-animation: dlLoaderDashOffset 3s linear infinite;
        animation: dlLoaderDashOffset 3s linear infinite;
      }
      @-webkit-keyframes dlLoaderDashOffset {
        0% {
          stroke-dashoffset: -66;
        }
        50% {
          stroke-dashoffset: -314;
        }
        to {
          stroke-dashoffset: -66;
        }
      }
      @keyframes dlLoaderDashOffset {
        0% {
          stroke-dashoffset: -66;
        }
        50% {
          stroke-dashoffset: -314;
        }
        to {
          stroke-dashoffset: -66;
        }
      }
      @-webkit-keyframes dlLoaderRotate {
        0% {
          transform: rotate(0);
        }
        50% {
          transform: rotate(1turn);
        }
        to {
          transform: rotate(3turn);
        }
      }
      @keyframes dlLoaderRotate {
        0% {
          transform: rotate(0);
        }
        50% {
          transform: rotate(1turn);
        }
        to {
          transform: rotate(3turn);
        }
